create-player-page:
  event: ON_JOIN
  actions:
    update-content:
      type: EDIT_CONTENT
      title: "UUID:%uuid%"
      section: 0
      file: "initial-page.txt"
      create-only: true
    redirect-1:
      type: EDIT_CONTENT
      title: "%username%"
      section: 0
      content: "#REDIRECT [[UUID:%uuid%]]"
      create-only: true
    redirect-2:
      type: EDIT_CONTENT
      title: "Player:%username%"
      section: 0
      content: "#REDIRECT [[UUID:%uuid%]]"
      create-only: true
force-update-player-page:
  event: MANUAL
  actions:
    update-content:
      type: EDIT_CONTENT
      title: "UUID:%uuid%"
      section: 0
      content: "{{PlayerInfoBox|uuid=%uuid%}}"
      create-only: false